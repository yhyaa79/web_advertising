<!-- templates/accounts/login.html -->
{% extends 'base.html' %}

{% block title %}ورود{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <h4>ورود به حساب کاربری</h4>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button type="submit" class="btn btn-primary w-100">ورود</button>
                </form>
                <hr>
                <p class="text-center">حساب کاربری ندارید؟ <a href="{% url 'accounts:register' %}">ثبت‌نام</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
